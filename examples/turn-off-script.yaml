# ─────────────────────────────────────────────────────────────
# Example finish script — whatever you want to run when the timer ends.
# Point the card's `finish_action` (or the example automation) at this.
#
# This sample turns a device off via a scene and updates a status helper,
# but it can be anything: a scene, an IR command, a notification, etc.
# ─────────────────────────────────────────────────────────────

ac_off:
  alias: Turn AC off
  sequence:
    # 👉 Replace with your own off scene / IR command.
    - target:
        entity_id: scene.air_off
      action: scene.turn_on
    # Optional: update a status helper shown in the UI.
    - data:
        entity_id: input_text.ac_status
        value: "AC is off"
      action: input_text.set_value
  mode: single
