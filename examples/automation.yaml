# ─────────────────────────────────────────────────────────────
# Optional server-side automation — runs the finish action even when no
# dashboard is open. Use this INSTEAD of the card's `finish_action` if you
# need guaranteed, exactly-once execution regardless of any open client.
#
# Add via Settings -> Automations -> ⋮ -> Edit in YAML, or paste into
# automations.yaml. Replace the script entity_id with your own.
# ─────────────────────────────────────────────────────────────

- id: ac_timer_finished
  alias: "AC Timer — run action on finish"
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.ac_off
  action:
    # 👉 Replace with your own script/scene/automation.
    - service: script.turn_on
      target:
        entity_id: script.your_off_script
  mode: single
