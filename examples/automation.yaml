# ─────────────────────────────────────────────────────────────
# Server-side automation — runs the finish action when the timer ends, even
# when no dashboard is open (e.g. at night). This is the RELIABLE way to run
# your finish action; the card's own "Run on finish" only fires while a
# dashboard is open in a browser.
#
# Easiest: import the blueprint instead — blueprints/automation/ac_timer_off.yaml
# Or add this by hand via Settings -> Automations -> Create -> Edit in YAML.
# Replace the timer and script entity_ids with your own.
# ─────────────────────────────────────────────────────────────

alias: "AC Timer — run action when timer finishes"
mode: single
triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.ac_off          # 👈 your timer
actions:
  - action: script.turn_on
    target:
      entity_id: script.ac_turn_off    # 👈 your off script / scene / automation
